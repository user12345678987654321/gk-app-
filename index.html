<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Prep App</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  background: #f7f3ff;
}

/* Sidebar */
.sidebar {
  width: 200px;
  background: #e7d4ff;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  background: #ffd6e7;
  border-radius: 8px;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

.card {
  background: #fff0f6;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

textarea, input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.action {
  margin-top: 10px;
  width: 100%;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>GK App</h2>
  <button onclick="show('add')">Add GK</button>
  <button onclick="show('quiz')">Quiz</button>
  <button onclick="show('flash')">Flashcards</button>
  <button onclick="show('stats')">Stats</button>
</div>

<div class="main">

<!-- ADD -->
<div id="add" class="card">
  <h3>Add GK</h3>
  <textarea id="inputData" placeholder="Earth Day is April 22"></textarea>
  <input id="categoryInput" placeholder="Category">
  <button class="action" onclick="addQuestion()">Add</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
  <h3 id="question">Start quiz</h3>
  <select id="categoryFilter"></select>
  <button onclick="startQuiz()">Start</button>
  <div id="options"></div>
  <p id="score"></p>
</div>

<!-- FLASH -->
<div id="flash" class="card hidden">
  <h3>Flashcards</h3>
  <p id="flashcard">No data</p>
  <button onclick="flip()">Flip</button>
  <button onclick="next()">Next</button>
</div>

<!-- STATS -->
<div id="stats" class="card hidden">
  <h3>Stats</h3>
  <p id="statsText"></p>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("gk")||"[]");
let quiz=[], i=0, score=0;
let flashIndex=0, flipped=false;

function show(tab){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
}

function save(){
  localStorage.setItem("gk", JSON.stringify(db));
}

function generate(line){
  const parts = line.split(" is ");
  if(parts.length<2) return null;

  const q = parts[0];
  const a = parts[1];

  let opts = [a, "None", "All", "Unknown"];
  opts = opts.sort(()=>Math.random()-0.5);

  return {question:`What is ${q}?`, options:opts, answer:a};
}

function addQuestion(){
  const text = inputData.value;
  const cat = categoryInput.value || "General";

  const q = generate(text);
  if(!q){ alert("Use 'X is Y'"); return; }

  q.category = cat;
  db.push(q);
  save();
  alert("Added");
  updateCats();
}

function updateCats(){
  const cats = ["All", ...new Set(db.map(q=>q.category))];
  categoryFilter.innerHTML = cats.map(c=>`<option>${c}</option>`).join("");
}

function startQuiz(){
  const cat = categoryFilter.value;
  quiz = db.filter(q=>cat==="All"||q.category===cat);
  i=0; score=0;
  loadQ();
}

function loadQ(){
  if(i>=quiz.length){
    question.innerText="Finished!";
    options.innerHTML="";
    scoreText=`Score: ${score}/${quiz.length}`;
    return;
  }

  const q=quiz[i];
  question.innerText=q.question;
  options.innerHTML="";

  q.options.forEach(o=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>{
      if(o===q.answer) score++;
      i++;
      loadQ();
    };
    options.appendChild(b);
  });
}

function flip(){
  if(db.length===0) return;
  flipped=!flipped;
  flashcard.innerText = flipped ? db[flashIndex].answer : db[flashIndex].question;
}

function next(){
  flashIndex=(flashIndex+1)%db.length;
  flipped=false;
  flashcard.innerText = db[flashIndex]?.question || "No data";
}

updateCats();
</script>

</body>
</html>
