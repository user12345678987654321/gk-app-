<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GK Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: #fdf6f9;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
      background: #fff0f5;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: #ffd6e0;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #score {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>GK Quiz</h1>
  <h3 id="question">Loading...</h3>
  <div id="options"></div>
  <p id="score"></p>
</div>

<script>
const questions = [
  {
    question: "Earth Day is celebrated on?",
    options: ["April 22", "June 5", "March 21", "May 1"],
    answer: "April 22"
  },
  {
    question: "ISRO is the space agency of?",
    options: ["USA", "India", "Russia", "China"],
    answer: "India"
  }
];

let index = 0;
let score = 0;

function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").innerText = q.question;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;

    btn.onclick = () => {
      if (opt === q.answer) score++;

      index++;

      if (index < questions.length) {
        loadQuestion();
      } else {
        document.getElementById("question").innerText = "Quiz Finished!";
        optionsDiv.innerHTML = "";
        document.getElementById("score").innerText = "Score: " + score;
      }
    };

    optionsDiv.appendChild(btn);
  });
}

loadQuestion();
</script>

</body>
</html>
